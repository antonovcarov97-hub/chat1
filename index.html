<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#0e1621;color:#fff;height:100vh;display:flex}
        
        .sidebar{width:300px;background:#17212b;display:flex;flex-direction:column;border-right:1px solid #1c2733}
        .sidebar h2{padding:15px;background:#242f3d;font-size:18px;border-bottom:1px solid #1c2733}
        .users{flex:1;overflow-y:auto}
        .user{
            padding:12px 15px;display:flex;align-items:center;gap:10px;
            cursor:pointer;border-bottom:1px solid rgba(255,255,255,.02);
        }
        .user:active{background:#1e2c3a}
        .user.active{background:#2b5278}
        .av{
            width:46px;height:46px;border-radius:50%;flex-shrink:0;
            background:linear-gradient(135deg,#5288c1,#6a5acd);
            display:flex;align-items:center;justify-content:center;
            font-size:20px;font-weight:600;
        }
        .user-info{flex:1;min-width:0}
        .user-name{font-size:15px;font-weight:500}
        .user-last{font-size:13px;color:#7f8fa4;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .user-time{font-size:11px;color:#7f8fa4}
        .unread{background:#5288c1;color:#fff;font-size:11px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
        
        .main{flex:1;display:flex;flex-direction:column}
        .chat-header{background:#17212b;padding:10px 15px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1c2733}
        .messages{flex:1;overflow-y:auto;padding:15px}
        .msg{margin-bottom:8px}
        .in .bubble{background:#182533;display:inline-block;max-width:70%;padding:8px 12px;border-radius:10px;font-size:15px;word-wrap:break-word}
        .out{text-align:right}
        .out .bubble{background:#2b5278;display:inline-block;max-width:70%;padding:8px 12px;border-radius:10px;font-size:15px;word-wrap:break-word}
        .sender{font-size:11px;color:#5288c1;margin-bottom:2px}
        .time{font-size:10px;color:rgba(255,255,255,.4);text-align:right;margin-top:2px}
        .input-area{background:#17212b;padding:10px 15px;display:flex;gap:10px;border-top:1px solid #1c2733}
        input{flex:1;padding:10px 15px;background:#242f3d;border:none;border-radius:20px;color:#fff;font-size:15px;outline:none}
        button{width:42px;height:42px;border-radius:50%;background:#5288c1;border:none;color:#fff;font-size:20px;cursor:pointer}
        .empty{text-align:center;color:#7f8fa4;padding:50px}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>💬 Чаты</h2>
        <div class="users" id="users"><div class="empty">Ждем...</div></div>
    </div>
    <div class="main">
        <div class="chat-header">
            <div class="av" id="ha">?</div>
            <div><div style="font-weight:500" id="hn">Выберите чат</div><div style="font-size:11px;color:#5288c1">онлайн</div></div>
        </div>
        <div class="messages" id="msgs"><div class="empty">💬 Выберите чат</div></div>
        <div class="input-area">
            <input id="inp" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()">➤</button>
        </div>
    </div>
    <script>
        var T="8953225877:AAFjsj8bJgMni7EkAM0L2w36xBBRR2tdDv8";
        var APIS=["https://api.telegram.org/bot"+T,"https://149.154.167.220/bot"+T];
        var ai=0,chats={},cur=null,lid=0,seen={};
        
        try{var d=JSON.parse(localStorage.getItem("t2"));if(d){chats=d.chats||{};lid=d.lid||0;cur=d.cur;seen=d.seen||{}}}catch(e){}
        function save(){localStorage.setItem("t2",JSON.stringify({chats:chats,lid:lid,cur:cur,seen:seen}))}
        
        function api(method,data,cb){
            var x=new XMLHttpRequest();
            x.open(data?"POST":"GET",APIS[ai]+"/"+method);
            if(data){x.setRequestHeader("Content-Type","application/json")}
            x.timeout=10000;
            x.onload=function(){
                if(x.status==200){try{cb(JSON.parse(x.responseText))}catch(e){cb(null)}}
                else{ai=(ai+1)%APIS.length;api(method,data,cb)}
            };
            x.onerror=function(){ai=(ai+1)%APIS.length;api(method,data,cb)};
            x.send(data?JSON.stringify(data):null);
        }
        
        function update(){
            api("getUpdates?offset="+(lid+1)+"&timeout=10",null,function(d){
                if(d&&d.ok&&d.result){
                    d.result.forEach(function(u){
                        lid=u.update_id;
                        var m=u.message||u.channel_post;
                        if(!m)return;
                        
                        var id=String(m.chat.id);
                        var mid=m.message_id;
                        
                        // Проверка на повтор
                        if(seen[mid])return;
                        seen[mid]=true;
                        if(Object.keys(seen).length>1000){seen={};seen[mid]=true}
                        
                        var isG=m.chat.type=="group"||m.chat.type=="supergroup";
                        
                        if(!chats[id]){
                            chats[id]={
                                name:isG?(m.chat.title||"Группа"):(m.chat.first_name||m.chat.username||"Юзер"),
                                msgs:[],isGroup:isG
                            };
                        }
                        
                        var msg={mid:mid,date:m.date,type:"in",sender:isG?(m.from?m.from.first_name:"Юзер"):null};
                        if(m.text)msg.text=m.text;
                        else if(m.photo)msg.text="🖼️ Фото";
                        else if(m.video)msg.text="🎬 Видео";
                        else if(m.voice)msg.text="🎤 Голосовое";
                        else if(m.sticker)msg.text="😀 Стикер";
                        else if(m.document)msg.text="📁 Файл";
                        else return;
                        
                        chats[id].msgs.push(msg);
                    });
                    save();showUsers();if(cur)showChat()
                }
            });
        }
        
        function showUsers(){
            var c=document.getElementById("users");
            var ids=Object.keys(chats).sort(function(a,b){
                var ma=chats[a].msgs,mb=chats[b].msgs;
                return (mb.length?mb[mb.length-1].date:0)-(ma.length?ma[ma.length-1].date:0)
            });
            
            if(!ids.length){c.innerHTML='<div class="empty">Напишите боту @Artem_Komp_bot</div>';return}
            
            var h="";
            ids.forEach(function(id){
                var u=chats[id],ms=u.msgs,last=ms[ms.length-1];
                var time=last?new Date(last.date*1000).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}):"";
                var txt=last?last.text:"";
                h+='<div class="user'+(id==cur?" active":"")+'" onclick="openChat(\''+id+'\')"><div class="av">'+(u.isGroup?"👥":u.name[0].toUpperCase())+'</div><div class="user-info"><div class="user-name">'+esc(u.name)+(u.isGroup?' <span style="font-size:10px;background:#5288c1;color:#fff;padding:1px 5px;border-radius:4px">группа</span>':'')+'</div><div class="user-last">'+esc(txt.substring(0,25))+'</div></div><div class="user-time">'+time+'</div></div>';
            });
            c.innerHTML=h;
        }
        
        function openChat(id){
            cur=id;
            document.getElementById("ha").textContent=chats[id].name[0].toUpperCase();
            document.getElementById("hn").textContent=chats[id].name;
            save();showChat();showUsers();
            document.getElementById("inp").focus();
        }
        
        function showChat(){
            var c=document.getElementById("msgs");
            if(!cur||!chats[cur]){c.innerHTML='<div class="empty">💬 Выберите чат</div>';return}
            var ms=chats[cur].msgs;
            if(!ms.length){c.innerHTML='<div class="empty">Нет сообщений</div>';return}
            
            var h="";
            ms.forEach(function(m){
                var t=new Date(m.date*1000).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
                var s=m.sender?'<div class="sender">'+esc(m.sender)+'</div>':'';
                h+='<div class="msg '+(m.type=="in"?"in":"out")+'"><div class="bubble">'+s+esc(m.text)+'<div class="time">'+t+'</div></div></div>';
            });
            c.innerHTML=h;c.scrollTop=c.scrollHeight
        }
        
        function send(){
            if(!cur)return;
            var t=document.getElementById("inp").value.trim();
            if(!t)return;
            document.getElementById("inp").value="";
            api("sendMessage",{chat_id:parseInt(cur),text:t},function(d){
                if(d&&d.ok){
                    if(!chats[cur])chats[cur]={name:"Чат",msgs:[],isGroup:false};
                    chats[cur].msgs.push({mid:d.result.message_id,text:t,date:d.result.date,type:"out"});
                    save();showChat()
                }
            });
        }
        
        function esc(t){var d=document.createElement("div");d.textContent=t;return d.innerHTML}
        
        showUsers();setInterval(update,2000);update();
    </script>
</body>
</html>
