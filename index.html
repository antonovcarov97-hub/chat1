<!-- telegram_fixed.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#000;display:flex;justify-content:center;align-items:center;height:100vh}
        .app{width:100%;max-width:430px;height:100vh;background:#0e1621;position:relative;overflow:hidden}
        
        .screen-contacts{position:absolute;top:0;left:0;width:100%;height:100%;background:#0e1621;display:flex;flex-direction:column;transition:0.3s}
        .screen-contacts.hidden{left:-100%}
        
        .header{background:#17212b;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1c2733}
        .header h1{font-size:20px;font-weight:600}
        .header-badge{background:#5288c1;color:#fff;font-size:12px;padding:2px 8px;border-radius:10px}
        
        .contacts-list{flex:1;overflow-y:auto}
        .contacts-list::-webkit-scrollbar{width:0}
        
        .contact{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.02)}
        .contact:active{background:#1e2c3a}
        
        .avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;overflow:hidden;position:relative;background:linear-gradient(135deg,#5288c1,#6a5acd);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600}
        .avatar img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
        .avatar .letter{position:relative;z-index:1;color:#fff}
        
        .contact-info{flex:1;min-width:0}
        .contact-row{display:flex;justify-content:space-between}
        .contact-name{font-size:16px;font-weight:500}
        .contact-time{font-size:12px;color:#7f8fa4}
        .contact-msg{font-size:14px;color:#7f8fa4;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .unread-badge{background:#5288c1;color:#fff;font-size:11px;font-weight:600;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}
        
        .screen-chat{position:absolute;top:0;left:100%;width:100%;height:100%;background:#0e1621;display:flex;flex-direction:column;transition:0.3s}
        .screen-chat.open{left:0}
        
        .chat-header{background:#17212b;padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1c2733}
        .back{color:#5288c1;font-size:28px;cursor:pointer;width:30px}
        .chat-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#5288c1,#6a5acd);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;position:relative}
        .chat-avatar img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
        .chat-avatar .letter{position:relative;z-index:1;color:#fff}
        .chat-name{font-size:16px;font-weight:600}
        .chat-status{font-size:11px;color:#5288c1}
        
        .messages{flex:1;overflow-y:auto;padding:10px 12px}
        .messages::-webkit-scrollbar{width:0}
        
        .msg{display:flex;margin:3px 0;align-items:flex-end;gap:4px}
        .msg.in{justify-content:flex-start}
        .msg.out{justify-content:flex-end}
        .msg-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#5288c1,#6a5acd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
        
        .bubble{max-width:70%;padding:7px 10px;border-radius:10px;font-size:15px;word-wrap:break-word;overflow:hidden}
        .in .bubble{background:#182533;border-bottom-left-radius:2px}
        .out .bubble{background:#2b5278;border-bottom-right-radius:2px}
        .bubble img{max-width:100%;max-height:300px;border-radius:8px;margin:3px 0;display:block}
        .bubble video{max-width:100%;max-height:300px;border-radius:8px;margin:3px 0}
        .bubble audio{width:200px;margin:3px 0}
        .bubble .sticker{width:120px;height:120px}
        
        .msg-sender{font-size:11px;color:#5288c1;margin-bottom:1px}
        .msg-time{font-size:10px;color:rgba(255,255,255,0.4);text-align:right;margin-top:3px;display:flex;align-items:center;justify-content:flex-end;gap:3px}
        .msg-check{color:#5288c1;font-size:10px}
        
        .unread-divider{text-align:center;padding:8px;margin:5px 0}
        .unread-divider span{background:#1c2733;color:#5288c1;font-size:12px;padding:4px 12px;border-radius:10px;font-weight:500}
        
        .input-bar{background:#17212b;padding:6px 10px;display:flex;align-items:center;gap:8px;border-top:1px solid #1c2733}
        .attach-btn{color:#7f8fa4;font-size:22px;cursor:pointer}
        .input-bar input{flex:1;background:#242f3d;border:none;border-radius:18px;padding:9px 14px;color:#fff;font-size:15px;outline:none}
        .input-bar input::placeholder{color:#7f8fa4}
        .send-btn{width:36px;height:36px;border-radius:50%;background:#5288c1;border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        
        .action-menu{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);background:#17212b;border-radius:15px;padding:10px;display:none;gap:12px;z-index:50}
        .action-menu.show{display:flex}
        .action-item{text-align:center;color:#fff;font-size:12px;cursor:pointer;padding:8px 10px;border-radius:10px}
        .action-item:hover{background:#242f3d}
        .action-item .icon{font-size:26px;margin-bottom:3px}
        
        .viewer{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
        .viewer.show{display:flex}
        .viewer-close{position:absolute;top:20px;right:20px;color:#fff;font-size:30px;cursor:pointer;z-index:101}
        .viewer img{max-width:95%;max-height:80vh;object-fit:contain;border-radius:10px}
        .viewer video{max-width:95%;max-height:80vh;border-radius:10px}
        
        .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#7f8fa4;text-align:center}
        .empty .icon{font-size:50px;margin-bottom:10px}
    </style>
</head>
<body>
    <div class="app">
        <div class="screen-contacts" id="contactsScreen">
            <div class="header"><h1>Все чаты</h1><span class="header-badge" id="totalUnread"></span></div>
            <div class="contacts-list" id="contactsList">
                <div class="empty"><div class="icon">💬</div><p>Напишите боту @Artem_Komp_bot</p></div>
            </div>
        </div>
        
        <div class="screen-chat" id="chatScreen">
            <div class="chat-header">
                <div class="back" onclick="closeChat()">←</div>
                <div class="chat-avatar" id="cAvatar"><img id="cAvatarImg" style="display:none"><span class="letter" id="cAvatarLetter">A</span></div>
                <div><div class="chat-name" id="cName">Чат</div><div class="chat-status" id="cStatus">онлайн</div></div>
            </div>
            <div class="messages" id="messages"><div class="empty"><div style="font-size:60px;margin-bottom:10px">✈️</div><div>Нет сообщений</div></div></div>
            <div class="input-bar">
                <span class="attach-btn" onclick="toggleMenu()">📎</span>
                <input id="msgInput" placeholder="Сообщение" onkeypress="if(event.key==='Enter')sendMsg()">
                <div class="send-btn" onclick="sendMsg()">➤</div>
            </div>
            <div class="action-menu" id="actionMenu">
                <div class="action-item" onclick="sendFile('photo')"><div class="icon">🖼️</div>Фото</div>
                <div class="action-item" onclick="sendFile('video')"><div class="icon">🎬</div>Видео</div>
                <div class="action-item" onclick="sendFile('voice')"><div class="icon">🎤</div>Голос</div>
                <div class="action-item" onclick="sendFile('document')"><div class="icon">📁</div>Файл</div>
            </div>
        </div>
    </div>
    
    <div class="viewer" id="viewer" onclick="closeViewer()"><div class="viewer-close" onclick="closeViewer()">✕</div><div id="viewerContent"></div></div>
    <input type="file" id="fileInput" style="display:none">

    <script>
        const T="8953225877:AAFjsj8bJgMni7EkAM0L2w36xBBRR2tdDv8";
        const A="https://api.telegram.org/bot"+T;
        let chats={},cur=null,lid=0,fileType=null;
        
        try{const d=JSON.parse(localStorage.getItem("tg_data"));if(d){chats=d.chats||{};lid=d.lid||0;cur=d.cur}}catch(e){}
        function save(){localStorage.setItem("tg_data",JSON.stringify({chats:chats,lid:lid,cur:cur}))}
        function isDup(cid,mid){return chats[cid]?.msgs.some(m=>m.messageId===mid)}
        
        function getUnread(cid){return chats[cid]?chats[cid].msgs.filter(m=>m.type==="in"&&!m.read).length:0}
        
        async function loadAvatar(chatId,imgEl,letterEl){
            try{
                const r=await fetch(A+"/getChat?chat_id="+chatId);
                const d=await r.json();
                if(d.ok&&d.result.photo){
                    const fr=await fetch(A+"/getFile?file_id="+d.result.photo.small_file_id);
                    const fd=await fr.json();
                    if(fd.ok){imgEl.src="https://api.telegram.org/file/bot"+T+"/"+fd.result.file_path;imgEl.style.display="block";letterEl.style.display="none"}
                }
            }catch(e){}
        }
        
        function update(){
            fetch(A+"/getUpdates?offset="+(lid+1)+"&timeout=10")
            .then(r=>r.json()).then(d=>{
                if(d.ok&&d.result.length){
                    d.result.forEach(u=>{
                        lid=u.update_id;
                        const m=u.message||u.channel_post;
                        if(!m)return;
                        const id=String(m.chat.id);
                        if(isDup(id,m.message_id))return;
                        
                        const isG=m.chat.type==="group"||m.chat.type==="supergroup";
                        const isC=m.chat.type==="channel";
                        
                        if(!chats[id]){
                            chats[id]={user:{id:m.chat.id,name:isC?(m.chat.title||"Канал"):isG?(m.chat.title||"Группа"):(m.chat.first_name||m.chat.username||"Контакт"),isGroup:isG,isChannel:isC},msgs:[]};
                            loadAvatar(m.chat.id,document.getElementById("avimg_"+id),document.getElementById("avlet_"+id));
                        }
                        
                        let msg={messageId:m.message_id,date:m.date,type:"in",read:false,sender:isG||isC?(m.from?.first_name||m.author_signature||""):null};
                        
                        if(m.text)msg.text=m.text;
                        else if(m.photo)msg.photo=m.photo[m.photo.length-1].file_id,msg.caption=m.caption||"";
                        else if(m.video)msg.video=m.video.file_id,msg.caption=m.caption||"";
                        else if(m.voice)msg.voice=m.voice.file_id;
                        else if(m.video_note)msg.videoNote=m.video_note.file_id;
                        else if(m.document)msg.document=m.document.file_id,msg.docName=m.document.file_name||"Файл";
                        else if(m.sticker)msg.sticker=m.sticker.file_id;
                        else if(m.animation)msg.animation=m.animation.file_id;
                        else return;
                        
                        chats[id].msgs.push(msg);
                    });
                    document.getElementById("totalUnread").textContent=Object.keys(chats).reduce((s,id)=>s+getUnread(id),0)||"";
                    save();showContacts();if(cur)showChat()
                }
            }).catch(()=>{});
        }
        
        function showContacts(){
            const c=document.getElementById("contactsList");
            const ids=Object.keys(chats).sort((a,b)=>{
                const ma=chats[a].msgs,mb=chats[b].msgs;
                return (mb.length?mb[mb.length-1].date:0)-(ma.length?ma[ma.length-1].date:0)
            });
            
            document.getElementById("totalUnread").textContent=ids.reduce((s,id)=>s+getUnread(id),0)||"";
            
            if(!ids.length){c.innerHTML='<div class="empty"><div class="icon">💬</div><p>Напишите боту @Artem_Komp_bot</p></div>';return}
            
            let h="";
            ids.forEach(id=>{
                const u=chats[id].user,m=chats[id].msgs,last=m[m.length-1];
                const unread=getUnread(id);
                const txt=last?(last.text||last.caption||(last.photo?"🖼️ Фото":last.video?"🎬 Видео":last.voice?"🎤 Голосовое":last.sticker?"😀 Стикер":"📎 Файл")):"";
                h+=`<div class="contact" onclick="openChat('${id}')">
                    <div class="avatar"><span class="letter">${u.isChannel?"📢":u.isGroup?"👥":u.name[0].toUpperCase()}</span></div>
                    <div class="contact-info">
                        <div class="contact-row"><div class="contact-name" style="${unread>0?'font-weight:600;color:#fff':''}">${esc(u.name)}</div><div class="contact-time">${last?new Date(last.date*1000).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}):""}</div></div>
                        <div style="display:flex;align-items:center;gap:5px;margin-top:2px"><div class="contact-msg" style="${unread>0?'color:#ddd':''}">${esc(txt.substring(0,25))}</div>${unread>0?`<span class="unread-badge">${unread}</span>`:''}</div>
                    </div>
                </div>`;
            });
            c.innerHTML=h;
        }
        
        function openChat(id){
            cur=id;const u=chats[id].user;
            document.getElementById("cAvatarLetter").textContent=u.isChannel?"📢":u.isGroup?"👥":u.name[0].toUpperCase();
            document.getElementById("cName").textContent=u.name;
            document.getElementById("chatScreen").classList.add("open");
            document.getElementById("contactsScreen").classList.add("hidden");
            chats[id].msgs.forEach(m=>{if(m.type==="in")m.read=true});
            save();showChat();showContacts();
            setTimeout(()=>document.getElementById("msgInput").focus(),300);
        }
        
        function closeChat(){
            document.getElementById("chatScreen").classList.remove("open");
            document.getElementById("contactsScreen").classList.remove("hidden");
            cur=null;save();showContacts();
        }
        
        async function getFileUrl(fileId){
            const r=await fetch(A+"/getFile?file_id="+fileId);
            const d=await r.json();
            return d.ok?"https://api.telegram.org/file/bot"+T+"/"+d.result.file_path:null;
        }
        
        function openViewer(content){document.getElementById("viewerContent").innerHTML=content;document.getElementById("viewer").classList.add("show")}
        function closeViewer(){document.getElementById("viewer").classList.remove("show");document.getElementById("viewerContent").innerHTML=""}
        
        async function showChat(){
            const c=document.getElementById("messages");
            if(!cur||!chats[cur])return;
            const msgs=chats[cur].msgs;
            if(!msgs.length){c.innerHTML='<div class="empty"><div style="font-size:60px;margin-bottom:10px">✈️</div><div>Нет сообщений</div></div>';return}
            
            const firstUnread=msgs.findIndex(m=>m.type==="in"&&!m.read);
            let h="";
            
            for(let i=0;i<msgs.length;i++){
                const m=msgs[i];
                if(i===firstUnread&&firstUnread>0)h+=`<div class="unread-divider"><span>Непрочитанные</span></div>`;
                
                const t=new Date(m.date*1000).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
                const cls=m.type==="in"?"in":"out";
                const sender=m.sender?`<div class="msg-sender">${esc(m.sender)}</div>`:"";
                const avatar=m.sender?`<div class="msg-avatar">${m.sender[0].toUpperCase()}</div>`:"";
                const check=m.type==="out"?'<span class="msg-check">✓✓</span>':"";
                
                let content="";
                if(m.text)content=esc(m.text).replace(/\n/g,"<br>");
                else if(m.photo){const url=await getFileUrl(m.photo);if(url)content=(m.caption?esc(m.caption)+"<br>":"")+`<img src="${url}" onclick="event.stopPropagation();openViewer('<img src=\\'${url}\\' style=\\'max-width:90vw;max-height:80vh\\'>')">`}
                else if(m.video){const url=await getFileUrl(m.video);if(url)content=(m.caption?esc(m.caption)+"<br>":"")+`<video src="${url}" controls onclick="event.stopPropagation()"></video>`}
                else if(m.voice){const url=await getFileUrl(m.voice);if(url)content=`🎤 <audio src="${url}" controls style="width:150px;height:30px" onclick="event.stopPropagation()"></audio>`}
                else if(m.videoNote){const url=await getFileUrl(m.videoNote);if(url)content=`<video src="${url}" controls loop style="width:120px;height:120px;border-radius:50%;object-fit:cover" onclick="event.stopPropagation()"></video>`}
                else if(m.sticker){const url=await getFileUrl(m.sticker);if(url)content=`<img src="${url}" class="sticker">`}
                else if(m.animation){const url=await getFileUrl(m.animation);if(url)content=`<img src="${url}">`}
                else if(m.document)content=`📁 ${esc(m.docName||"Файл")}`;
                
                h+=`<div class="msg ${cls}">${avatar}<div class="bubble">${sender}${content}<div class="msg-time">${t}${check}</div></div></div>`;
            }
            c.innerHTML=h;c.scrollTop=c.scrollHeight
        }
        
        function sendMsg(){
            if(!cur)return;
            const t=document.getElementById("msgInput").value.trim();
            if(!t)return;
            document.getElementById("msgInput").value="";
            fetch(A+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:parseInt(cur),text:t})})
            .then(r=>r.json()).then(d=>{
                if(d.ok){chats[cur].msgs.push({messageId:d.result.message_id,text:t,date:d.result.date,type:"out",read:true});save();showChat()}
            });
        }
        
        function toggleMenu(){document.getElementById("actionMenu").classList.toggle("show")}
        function sendFile(type){fileType=type;document.getElementById("fileInput").click()}
        
        document.getElementById("fileInput").addEventListener("change",async function(){
            if(!cur||!this.files.length)return;
            const file=this.files[0];
            const form=new FormData();
            form.append(fileType,file);
            form.append("chat_id",cur);
            try{await fetch(A+"/send"+fileType.charAt(0).toUpperCase()+fileType.slice(1),{method:"POST",body:form});update();showChat()}catch(e){}
            this.value="";document.getElementById("actionMenu").classList.remove("show");
        });
        
        function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML}
        
        showContacts();setInterval(update,2000);update();
    </script>
</body>
</html>
