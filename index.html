<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#0e1621;color:#fff;height:100vh;display:flex;flex-direction:column}
        .header{background:#17212b;padding:15px;text-align:center;font-size:18px;font-weight:bold}
        .messages{flex:1;overflow-y:auto;padding:15px}
        .msg{margin-bottom:10px}
        .in .bubble{background:#182533;display:inline-block;max-width:80%;padding:10px 14px;border-radius:12px;font-size:15px;word-wrap:break-word}
        .out{text-align:right}
        .out .bubble{background:#2b5278;display:inline-block;max-width:80%;padding:10px 14px;border-radius:12px;font-size:15px;word-wrap:break-word}
        .time{font-size:10px;color:rgba(255,255,255,0.5);margin-top:3px;text-align:right}
        .input-area{background:#17212b;padding:10px 15px;display:flex;gap:10px}
        input{flex:1;padding:12px;background:#242f3d;border:none;border-radius:20px;color:#fff;font-size:15px;outline:none}
        button{width:45px;height:45px;border-radius:50%;background:#5288c1;border:none;color:#fff;font-size:20px;cursor:pointer}
        .empty{text-align:center;color:#7f8fa4;padding:50px}
    </style>
</head>
<body>
    <div class="header">@Artem_Komp_bot</div>
    <div class="messages" id="msgs"><div class="empty">Жду сообщений...</div></div>
    <div class="input-area">
        <input id="inp" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">➤</button>
    </div>
    <script>
        var T="8953225877:AAFjsj8bJgMni7EkAM0L2w36xBBRR2tdDv8";
        // Используем несколько API точек
        var APIS=[
            "https://api.telegram.org/bot"+T,
            "https://149.154.167.220/bot"+T,
            "https://149.154.167.99/bot"+T
        ];
        var apiIndex=0;
        var cid=null,msgs=[],lid=0;
        
        try{var d=JSON.parse(localStorage.getItem("tc"));if(d){msgs=d.msgs||[];lid=d.lid||0;cid=d.cid}}catch(e){}
        function save(){localStorage.setItem("tc",JSON.stringify({msgs:msgs,lid:lid,cid:cid}))}
        
        function apiUrl(method){
            return APIS[apiIndex]+"/"+method;
        }
        
        function switchAPI(){
            apiIndex=(apiIndex+1)%APIS.length;
        }
        
        function apiGet(method,callback){
            var x=new XMLHttpRequest();
            x.open("GET",apiUrl(method));
            x.timeout=10000;
            x.onload=function(){
                if(x.status==200){
                    try{callback(JSON.parse(x.responseText))}catch(e){callback(null)}
                }else{
                    switchAPI();
                    apiGet(method,callback);
                }
            };
            x.onerror=function(){switchAPI();apiGet(method,callback)};
            x.ontimeout=function(){switchAPI();apiGet(method,callback)};
            x.send();
        }
        
        function apiPost(method,data,callback){
            var x=new XMLHttpRequest();
            x.open("POST",apiUrl(method));
            x.setRequestHeader("Content-Type","application/json");
            x.timeout=10000;
            x.onload=function(){
                if(x.status==200){
                    try{callback(JSON.parse(x.responseText))}catch(e){callback(null)}
                }else{
                    switchAPI();
                    apiPost(method,data,callback);
                }
            };
            x.onerror=function(){switchAPI();apiPost(method,data,callback)};
            x.ontimeout=function(){switchAPI();apiPost(method,data,callback)};
            x.send(JSON.stringify(data));
        }
        
        function show(){
            var c=document.getElementById("msgs");
            if(!msgs.length){c.innerHTML='<div class="empty">Жду сообщений...</div>';return}
            var h="";
            for(var i=0;i<msgs.length;i++){
                var m=msgs[i];
                var t=new Date(m.date*1000).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
                h+='<div class="msg '+(m.type=="in"?"in":"out")+'"><div class="bubble">'+m.text.replace(/</g,"&lt;")+'<div class="time">'+t+'</div></div></div>';
            }
            c.innerHTML=h;c.scrollTop=c.scrollHeight
        }
        
        function update(){
            apiGet("getUpdates?offset="+(lid+1)+"&timeout=10",function(d){
                if(d&&d.ok&&d.result.length){
                    for(var i=0;i<d.result.length;i++){
                        lid=d.result[i].update_id;
                        var m=d.result[i].message;
                        if(!m||!m.text)continue;
                        cid=String(m.chat.id);
                        var dup=false;
                        for(var j=0;j<msgs.length;j++){
                            if(msgs[j].text==m.text&&Math.abs(msgs[j].date-m.date)<2){dup=true;break}
                        }
                        if(!dup){msgs.push({text:m.text,date:m.date,type:"in"});save();show()}
                    }
                }
            });
        }
        
        function send(){
            var t=document.getElementById("inp").value.trim();
            if(!t)return;
            if(!cid){alert("Напишите боту @Artem_Komp_bot в Telegram!");return}
            document.getElementById("inp").value="";
            apiPost("sendMessage",{chat_id:parseInt(cid),text:t},function(d){
                if(d&&d.ok){msgs.push({text:t,date:Math.floor(Date.now()/1000),type:"out"});save();show()}
            });
        }
        
        show();setInterval(update,2000);update();
    </script>
</body>
</html>
