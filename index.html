<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
        .app{width:100%;max-width:430px;height:100vh;background:#fff;display:flex;flex-direction:column;position:relative;overflow:hidden}
        
        .contacts-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;background:#fff}
        .contacts-screen.hidden{left:-100%}
        
        .header{background:#f5f5f5;padding:12px 16px;border-bottom:1px solid #ddd}
        .header h1{font-size:20px;color:#000;margin:0}
        
        .users-list{flex:1;overflow-y:auto}
        .user{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid #eee}
        .user:active{background:#f0f0f0}
        .avatar{width:48px;height:48px;border-radius:50%;background:#4a90d9;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:bold;flex-shrink:0}
        .user-info{flex:1;min-width:0}
        .user-name{font-size:15px;font-weight:500;color:#000}
        .user-last{font-size:13px;color:#999;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .user-time{font-size:11px;color:#999}
        
        .chat-screen{position:absolute;top:0;left:100%;width:100%;height:100%;display:flex;flex-direction:column;background:#fff}
        .chat-screen.open{left:0}
        
        .chat-header{background:#f5f5f5;padding:10px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #ddd}
        .back-btn{color:#4a90d9;font-size:24px;cursor:pointer;font-weight:bold}
        .chat-name{font-size:16px;font-weight:600;color:#000}
        
        .messages{flex:1;overflow-y:auto;padding:10px;background:#e5ddd5}
        .msg{margin:5px 0}
        .in .bubble{background:#fff;display:inline-block;max-width:75%;padding:8px 12px;border-radius:8px;font-size:15px;color:#000;word-wrap:break-word}
        .out{text-align:right}
        .out .bubble{background:#dcf8c6;display:inline-block;max-width:75%;padding:8px 12px;border-radius:8px;font-size:15px;color:#000;word-wrap:break-word}
        .sender{font-size:11px;color:#4a90d9;margin-bottom:2px}
        .time{font-size:10px;color:rgba(0,0,0,0.45);text-align:right;margin-top:2px}
        .bubble img{max-width:200px;max-height:200px;border-radius:6px;display:block;margin:3px 0}
        
        .input-bar{background:#f5f5f5;padding:8px 10px;display:flex;align-items:center;gap:8px;border-top:1px solid #ddd}
        .input-bar input{flex:1;padding:10px;background:#fff;border:1px solid #ddd;border-radius:20px;font-size:15px;outline:none}
        .send-btn{background:#4a90d9;color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer}
        
        .empty{text-align:center;color:#999;padding:50px;font-size:15px}
    </style>
</head>
<body>
    <div class="app">
        <div class="contacts-screen" id="contacts">
            <div class="header"><h1>Telegram</h1></div>
            <div class="users-list" id="users"><div class="empty">Напишите боту @Artem_Komp_bot</div></div>
        </div>
        
        <div class="chat-screen" id="chat">
            <div class="chat-header">
                <div class="back-btn" onclick="goBack()">←</div>
                <div class="chat-name" id="cn">Чат</div>
            </div>
            <div class="messages" id="msgs"><div class="empty">Нет сообщений</div></div>
            <div class="input-bar">
                <input id="inp" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMsg()">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>
    <script>
        var T="8953225877:AAFjsj8bJgMni7EkAM0L2w36xBBRR2tdDv8";
        var A="https://api.telegram.org/bot"+T;
        var chats=JSON.parse(localStorage.getItem("c")||"{}");
        var cur=localStorage.getItem("cur")||null;
        var lid=parseInt(localStorage.getItem("lid")||"0");
        var seen=JSON.parse(localStorage.getItem("seen")||"{}");
        
        function save(){localStorage.setItem("c",JSON.stringify(chats));localStorage.setItem("cur",cur||"");localStorage.setItem("lid",lid);localStorage.setItem("seen",JSON.stringify(seen))}
        
        function api(method,data,cb){
            var x=new XMLHttpRequest();
            x.open(data?"POST":"GET",A+"/"+method);
            if(data)x.setRequestHeader("Content-Type","application/json");
            x.onload=function(){try{cb(JSON.parse(x.responseText))}catch(e){}};
            x.onerror=function(){setTimeout(function(){api(method,data,cb)},2000)};
            x.send(data?JSON.stringify(data):null);
        }
        
        function update(){
            api("getUpdates?offset="+(lid+1)+"&timeout=10",null,function(d){
                if(!d||!d.result)return;
                d.result.forEach(function(u){
                    lid=u.update_id;
                    var m=u.message||u.channel_post;
                    if(!m||seen[m.message_id])return;
                    seen[m.message_id]=true;
                    
                    var id=String(m.chat.id);
                    if(!chats[id])chats[id]={name:m.chat.first_name||m.chat.title||m.chat.username||"Контакт",msgs:[],isGroup:m.chat.type=="group"||m.chat.type=="supergroup"};
                    
                    var msg={mid:m.message_id,date:m.date,type:"in",sender:chats[id].isGroup&&m.from?m.from.first_name:null};
                    if(m.text)msg.text=m.text;
                    else if(m.photo){msg.photo=m.photo[m.photo.length-1].file_id;msg.caption=m.caption||""}
                    else if(m.sticker)msg.sticker=m.sticker.file_id;
                    else if(m.video)msg.video=m.video.file_id;
                    else if(m.voice)msg.voice=m.voice.file_id;
                    else return;
                    
                    chats[id].msgs.push(msg);
                });
                save();showUsers();if(cur)showChat();
            });
        }
        
        function showUsers(){
            var c=document.getElementById("users");
            var ids=Object.keys(chats).sort(function(a,b){return (chats[b].msgs.length?chats[b].msgs[chats[b].msgs.length-1].date:0)-(chats[a].msgs.length?chats[a].msgs[chats[a].msgs.length-1].date:0)});
            if(!ids.length){c.innerHTML='<div class="empty">Напишите боту @Artem_Komp_bot</div>';return}
            var h="";
            ids.forEach(function(id){
                var u=chats[id],last=u.msgs[u.msgs.length-1];
                var txt=last?(last.text||last.caption||(last.photo?"Фото":last.sticker?"Стикер":last.video?"Видео":last.voice?"Голосовое":"")):"";
                h+='<div class="user" onclick="openChat(\''+id+'\')"><div class="avatar">'+(u.isGroup?"👥":u.name[0].toUpperCase())+'</div><div class="user-info"><div class="user-name">'+esc(u.name)+(u.isGroup?" 👥":"")+'</div><div class="user-last">'+esc(txt.substring(0,30))+'</div></div></div>';
            });
            c.innerHTML=h;
        }
        
        function openChat(id){cur=id;document.getElementById("cn").textContent=chats[id].name;document.getElementById("chat").classList.add("open");document.getElementById("contacts").classList.add("hidden");save();showChat()}
        function goBack(){document.getElementById("chat").classList.remove("open");document.getElementById("contacts").classList.remove("hidden");cur=null;save();showUsers()}
        
        function getFile(fileId,cb){
            api("getFile?file_id="+fileId,null,function(d){if(d&&d.ok)cb("https://api.telegram.org/file/bot"+T+"/"+d.result.file_path)});
        }
        
        function showChat(){
            var c=document.getElementById("msgs");
            if(!cur||!chats[cur])return;
            var ms=chats[cur].msgs;
            if(!ms.length){c.innerHTML='<div class="empty">Нет сообщений</div>';return}
            var h="";
            ms.forEach(function(m){
                var t=new Date(m.date*1000).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
                var s=m.sender?'<div class="sender">'+esc(m.sender)+'</div>':'';
                var content="";
                if(m.text)content=esc(m.text).replace(/\n/g,"<br>");
                else if(m.photo){content=(m.caption?esc(m.caption)+"<br>":"")+'<img id="img_'+m.mid+'" src="" style="max-width:200px">';setTimeout(function(){getFile(m.photo,function(url){var img=document.getElementById("img_"+m.mid);if(img&&url)img.src=url})},100)}
                else if(m.sticker){content='<img id="st_'+m.mid+'" src="" style="width:100px;height:100px">';setTimeout(function(){getFile(m.sticker,function(url){var img=document.getElementById("st_"+m.mid);if(img&&url)img.src=url})},100)}
                else if(m.video)content="🎬 Видео";
                else if(m.voice)content="🎤 Голосовое";
                h+='<div class="msg '+(m.type=="in"?"in":"out")+'"><div class="bubble">'+s+content+'<div class="time">'+t+'</div></div></div>';
            });
            c.innerHTML=h;c.scrollTop=c.scrollHeight;
        }
        
        function sendMsg(){
            if(!cur)return;
            var t=document.getElementById("inp").value.trim();
            if(!t)return;
            document.getElementById("inp").value="";
            api("sendMessage",{chat_id:parseInt(cur),text:t},function(d){
                if(d&&d.ok){chats[cur].msgs.push({mid:d.result.message_id,text:t,date:d.result.date,type:"out"});save();showChat()}
            });
        }
        
        function esc(t){var d=document.createElement("div");d.textContent=t;return d.innerHTML}
        
        showUsers();setInterval(update,2000);update();
    </script>
</body>
</html>
