<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#0e1621;color:#fff;height:100vh;display:flex;flex-direction:column}
        .header{background:#17212b;padding:15px;text-align:center;font-size:18px;font-weight:bold}
        .messages{flex:1;overflow-y:auto;padding:15px}
        .msg{margin-bottom:10px}
        .in .bubble{background:#182533;display:inline-block;max-width:80%;padding:10px 14px;border-radius:12px;font-size:15px;word-wrap:break-word}
        .out{text-align:right}
        .out .bubble{background:#2b5278;display:inline-block;max-width:80%;padding:10px 14px;border-radius:12px;font-size:15px;word-wrap:break-word}
        .time{font-size:10px;color:rgba(255,255,255,0.5);margin-top:3px;text-align:right}
        .input-area{background:#17212b;padding:10px 15px;display:flex;gap:10px}
        input{flex:1;padding:12px;background:#242f3d;border:none;border-radius:20px;color:#fff;font-size:15px;outline:none}
        button{width:45px;height:45px;border-radius:50%;background:#5288c1;border:none;color:#fff;font-size:20px;cursor:pointer}
        .empty{text-align:center;color:#7f8fa4;padding:50px}
    </style>
</head>
<body>
    <div class="header">@Artem_Komp_bot</div>
    <div class="messages" id="msgs"><div class="empty">Жду сообщений...</div></div>
    <div class="input-area">
        <input id="inp" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">➤</button>
    </div>
    <script>
        var T="8953225877:AAFjsj8bJgMni7EkAM0L2w36xBBRR2tdDv8";
        var A="https://api.telegram.org/bot"+T;
        var cid=null,msgs=[],lid=0;
        
        try{var d=JSON.parse(localStorage.getItem("t"));if(d){msgs=d.msgs||[];lid=d.lid||0;cid=d.cid}}catch(e){}
        
        function save(){localStorage.setItem("t",JSON.stringify({msgs:msgs,lid:lid,cid:cid}))}
        
        function show(){
            var c=document.getElementById("msgs");
            if(!msgs.length){c.innerHTML='<div class="empty">Жду сообщений...</div>';return}
            var h="";
            for(var i=0;i<msgs.length;i++){
                var m=msgs[i];
                var t=new Date(m.date*1000).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
                h+='<div class="msg '+(m.type=="in"?"in":"out")+'"><div class="bubble">'+m.text.replace(/</g,"&lt;")+'<div class="time">'+t+'</div></div></div>';
            }
            c.innerHTML=h;c.scrollTop=c.scrollHeight
        }
        
        function update(){
            var x=new XMLHttpRequest();
            x.open("GET",A+"/getUpdates?offset="+(lid+1)+"&timeout=10");
            x.onload=function(){
                try{
                    var d=JSON.parse(x.responseText);
                    if(d.ok&&d.result.length){
                        for(var i=0;i<d.result.length;i++){
                            lid=d.result[i].update_id;
                            var m=d.result[i].message;
                            if(!m||!m.text)continue;
                            cid=String(m.chat.id);
                            msgs.push({text:m.text,date:m.date,type:"in"});
                        }
                        save();show()
                    }
                }catch(e){}
            };
            x.send()
        }
        
        function send(){
            var t=document.getElementById("inp").value.trim();
            if(!t)return;
            if(!cid){alert("Сначала напишите боту @Artem_Komp_bot в Telegram!");return}
            document.getElementById("inp").value="";
            var x=new XMLHttpRequest();
            x.open("POST",A+"/sendMessage");
            x.setRequestHeader("Content-Type","application/json");
            x.onload=function(){
                var d=JSON.parse(x.responseText);
                if(d.ok){msgs.push({text:t,date:Math.floor(Date.now()/1000),type:"out"});save();show()}
            };
            x.send(JSON.stringify({chat_id:parseInt(cid),text:t}))
        }
        
        show();setInterval(update,2000);update();
    </script>
</body>
</html>
