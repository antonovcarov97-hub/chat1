<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#0e1621;color:#fff;height:100vh;display:flex;flex-direction:column}
        .header{background:#17212b;padding:15px;text-align:center;font-size:18px;font-weight:bold}
        .messages{flex:1;overflow-y:auto;padding:15px}
        .msg{margin-bottom:10px}
        .bubble{display:inline-block;max-width:80%;padding:10px 14px;border-radius:12px;font-size:15px;word-wrap:break-word}
        .in .bubble{background:#182533}
        .out{text-align:right}.out .bubble{background:#2b5278}
        .time{font-size:10px;color:rgba(255,255,255,0.5);margin-top:3px}
        .input-area{background:#17212b;padding:10px 15px;display:flex;gap:10px}
        input{flex:1;padding:12px;background:#242f3d;border:none;border-radius:20px;color:#fff;font-size:15px;outline:none}
        button{width:45px;height:45px;border-radius:50%;background:#5288c1;border:none;color:#fff;font-size:20px;cursor:pointer}
        .empty{text-align:center;color:#7f8fa4;padding:50px}
    </style>
</head>
<body>
    <div class="header">💬 @Artem_Komp_bot</div>
    <div class="messages" id="msgs"><div class="empty">Ожидание...</div></div>
    <div class="input-area">
        <input id="inp" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">➤</button>
    </div>
    <script>
        const A="https://api.telegram.org/bot8953225877:AAFjsj8bJgMni7EkAM0L2w36xBBRR2tdDv8";
        let cid=null,msgs=[],lid=0;
        try{const d=JSON.parse(localStorage.getItem("tg"));if(d){msgs=d.msgs||[];lid=d.lid||0;cid=d.cid}}catch(e){}
        function save(){localStorage.setItem("tg",JSON.stringify({msgs:msgs,lid:lid,cid:cid}))}
        function show(){const c=document.getElementById("msgs");if(!msgs.length){c.innerHTML='<div class="empty">Ожидание...</div>';return}let h="";msgs.forEach(m=>{const t=new Date(m.date*1000).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});h+=`<div class="msg ${m.type==="in"?"in":"out"}"><div class="bubble">${m.text.replace(/</g,"&lt;")}<div class="time">${t}</div></div></div>`});c.innerHTML=h;c.scrollTop=c.scrollHeight}
        async function check(){try{const r=await fetch(A+"/getUpdates?offset="+(lid+1)+"&timeout=10");const d=await r.json();if(d.ok&&d.result.length)d.result.forEach(u=>{lid=u.update_id;const m=u.message;if(!m||!m.text)return;cid=String(m.chat.id);if(!msgs.some(x=>x.text===m.text&&Math.abs(x.date-m.date)<3))msgs.push({text:m.text,date:m.date,type:"in"})});save();show()}catch(e){}}
        async function send(){const t=document.getElementById("inp").value.trim();if(!t)return;if(!cid){alert("Напишите боту @Artem_Komp_bot!");return}document.getElementById("inp").value="";const r=await fetch(A+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:parseInt(cid),text:t})});const d=await r.json();if(d.ok){msgs.push({text:t,date:Math.floor(Date.now()/1000),type:"out"});save();show()}}
        show();setInterval(check,2000);check();
    </script>
</body>
</html>
